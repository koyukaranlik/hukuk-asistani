<!-- Client-side PDF İşleme Kütüphanesi -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<!-- PDF Düzenleme Araçları (Birleştirme & Sayfa Çıkarma) -->
<div class="grid-2">
    <!-- 1. PDF Birleştirme Kartı -->
    <div class="card">
        <div class="card-title">🔗 Çoklu PDF Birleştirme</div>
        <div class="form-group">
            <label>Birleştirilecek PDF Dosyalarını Seçin (CTRL / SHIFT ile çoklu seçin)</label>
            <input type="file" id="mergePdfInput" accept=".pdf" multiple class="form-control">
        </div>
        <button class="btn btn-success" onclick="pdfBirlestir()">📑 PDF'leri Birleştir ve İndir</button>
        <div id="merge-durum" style="margin-top: 10px; font-size: 0.85rem; color: var(--primary-light); font-weight: 600;"></div>
    </div>

    <!-- 2. PDF Sayfa Çıkarma / Ayıklama Kartı -->
    <div class="card">
        <div class="card-title">✂️ PDF'ten Sayfa Çıkarma / Ayıklama</div>
        <div class="form-group">
            <label>İşlenecek PDF Dosyasını Seçin</label>
            <input type="file" id="splitPdfInput" accept=".pdf" class="form-control">
        </div>
        <div class="form-group">
            <label>Alınacak Sayfalar (Örn: 1-3, 5, 12-15)</label>
            <input type="text" id="splitSayfaInput" class="form-control" placeholder="Örn: 1-5, 8, 12">
        </div>
        <button class="btn" onclick="pdfSayfaCikar()">✂️ Seçili Sayfaları Yeni PDF Yap ve İndir</button>
        <div id="split-durum" style="margin-top: 10px; font-size: 0.85rem; color: var(--primary-light); font-weight: 600;"></div>
    </div>
</div>

<!-- 3. Belge Okuma & OCR Metin Arama Alanı -->
<div class="card">
    <h3 style="margin-bottom: 15px; color: var(--primary-light);">📄 Belge Metin Okuma (OCR / TIF / PDF) & Word'e Aktar</h3>
    <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px;">
        <div class="form-group">
            <label>Yüklenecek Dosyayı Seçin (PDF, TIF, TIFF, JPEG, PNG)</label>
            <input type="file" id="pdfInput" accept=".pdf, .tif, .tiff, .jpg, .jpeg, .png" class="form-control" onchange="belgeYukleVeIsle(event)">
        </div>
        <div class="form-group">
            <label>Okunacak Sayfalar (Boş Bırakılırsa Tümü)</label>
            <input type="text" id="sayfaSecimInput" class="form-control" placeholder="Tümü (ör: 1-3, 5, 12)">
        </div>
        <div class="form-group">
            <label>Dil Seçeneği (OCR İçin)</label>
            <select id="pdf-kaynak-dil" class="form-control">
                <option value="tr">Türkçe</option>
                <option value="en">İngilizce</option>
            </select>
        </div>
    </div>
    <div id="pdf-durum" style="margin-top: 10px; font-size: 0.88rem; color: var(--primary-light); font-weight: 600;">Hazır - Lütfen bir dosya yükleyin.</div>
</div>

<div class="grid-2">
    <div class="card">
        <div class="card-title">📄 Elde Edilen Düz Metin</div>
        <textarea id="pdf-orijinal-metin" class="form-control" style="height: 320px; resize: vertical;" placeholder="Okunan metinler buraya aktarılacaktır..."></textarea>
        <div class="action-bar">
            <button class="btn btn-success" onclick="wordOlarakIndir()">📝 Word (.doc) Olarak İndir</button>
            <button class="btn" onclick="metniKopyala()">📋 Metni Panoya Kopyala</button>
        </div>
    </div>
    <div class="card">
        <div class="card-title" style="color: var(--accent);">🌐 Türkçe Çeviri (Opsiyonel)</div>
        <textarea id="pdf-ceviri-metin" class="form-control" style="height: 320px; resize: vertical;" placeholder="Çeviri alanı..."></textarea>
    </div>
</div>

<script>
    // Sayfa Aralığı Ayrıştırma Yardımcı Fonksiyonu
    function parseSayfaAraligi(inputStr, maxSayfa) {
        if (!inputStr || !inputStr.trim()) {
            return Array.from({ length: maxSayfa }, (_, i) => i + 1);
        }
        const sayfalar = new Set();
        const parcalar = inputStr.split(',');

        for (let p of parcalar) {
            p = p.trim();
            if (p.includes('-')) {
                const aralik = p.split('-');
                const bas = parseInt(aralik[0].trim());
                const son = parseInt(aralik[1].trim());

                if (!isNaN(bas) && !isNaN(son)) {
                    const alt = Math.max(1, Math.min(bas, son));
                    const ust = Math.min(maxSayfa, Math.max(bas, son));
                    for (let i = alt; i <= ust; i++) sayfalar.add(i);
                }
            } else {
                const num = parseInt(p);
                if (!isNaN(num) && num >= 1 && num <= maxSayfa) sayfalar.add(num);
            }
        }
        return Array.from(sayfalar).sort((a, b) => a - b);
    }

    // ==========================================
    // 1. PDF BİRLEŞTİRME FONKSİYONU
    // ==========================================
    async function pdfBirlestir() {
        const fileInput = document.getElementById('mergePdfInput');
        const durumEl = document.getElementById('merge-durum');

        if (!fileInput.files || fileInput.files.length < 2) {
            alert("Lütfen birleştirmek için en az 2 PDF dosyası seçin.");
            return;
        }

        try {
            durumEl.innerText = "PDF dosyaları birleştiriliyor...";
            const mergedDoc = await PDFLib.PDFDocument.create();

            for (let i = 0; i < fileInput.files.length; i++) {
                const file = fileInput.files[i];
                durumEl.innerText = `İşleniyor (${i + 1}/${fileInput.files.length}): ${file.name}`;
                const arrayBuffer = await file.arrayBuffer();
                const srcDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                const copiedPages = await mergedDoc.copyPages(srcDoc, srcDoc.getPageIndices());
                copiedPages.forEach(p => mergedDoc.addPage(p));
            }

            const pdfBytes = await mergedDoc.save();
            
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Birlestirilmis_Evraklar_' + new Date().toISOString().slice(0,10) + '.pdf';
            a.click();
            URL.revokeObjectURL(url);

            durumEl.innerText = `✅ Başarılı! Seçilen ${fileInput.files.length} PDF birleştirilip indirildi.`;
        } catch (err) {
            console.error(err);
            durumEl.innerText = "⚠️ PDF birleştirilirken teknik bir hata oluştu.";
        }
    }

    // ==========================================
    // 2. PDF SAYFA ÇIKARMA / AYIKLAMA FONKSİYONU
    // ==========================================
    async function pdfSayfaCikar() {
        const fileInput = document.getElementById('splitPdfInput');
        const sayfaAraligi = document.getElementById('splitSayfaInput').value;
        const durumEl = document.getElementById('split-durum');

        if (!fileInput.files[0]) {
            alert("Lütfen önce bir PDF dosyası seçin.");
            return;
        }
        if (!sayfaAraligi.trim()) {
            alert("Lütfen çıkarılacak sayfa numaralarını girin (Örn: 1-3, 5).");
            return;
        }

        try {
            durumEl.innerText = "PDF ayıklanıyor...";
            const file = fileInput.files[0];
            const arrayBuffer = await file.arrayBuffer();
            
            const srcDoc = await PDFLib.PDFDocument.load(arrayBuffer);
            const totalPages = srcDoc.getPageCount();
            
            const secilenSayfalar = parseSayfaAraligi(sayfaAraligi, totalPages);
            if (secilenSayfalar.length === 0) {
                alert("Geçersiz sayfa numarası veya aralığı!");
                return;
            }

            const newDoc = await PDFLib.PDFDocument.create();
            const indices = secilenSayfalar.map(p => p - 1); // 0-tabanlı indeks
            const copiedPages = await newDoc.copyPages(srcDoc, indices);
            copiedPages.forEach(p => newDoc.addPage(p));

            const pdfBytes = await newDoc.save();
            
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Ayiklanan_Sayfalar_' + new Date().toISOString().slice(0,10) + '.pdf';
            a.click();
            URL.revokeObjectURL(url);

            durumEl.innerText = `✅ Başarılı! ${secilenSayfalar.length} sayfa ayıklanarak yeni PDF indirildi.`;
        } catch (err) {
            console.error(err);
            durumEl.innerText = "⚠️ Sayfa çıkarılırken bir hata oluştu.";
        }
    }

    // ==========================================
    // 3. OCR VE METİN OKUMA MOTORU
    // ==========================================
    async function belgeYukleVeIsle(event) {
        const file = event.target.files[0];
        const durumEl = document.getElementById('pdf-durum');
        const orjMetinEl = document.getElementById('pdf-orijinal-metin');
        const sayfaSecimInput = document.getElementById('sayfaSecimInput')?.value;

        if (!file) return;

        durumEl.innerText = "Belge inceleniyor...";
        orjMetinEl.value = "";
        const fileName = file.name.toLowerCase();

        try {
            if (fileName.endsWith('.pdf')) {
                durumEl.innerText = "PDF dosyası okunuyor...";
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let tamMetin = "";
                const hedefSayfalar = parseSayfaAraligi(sayfaSecimInput, pdf.numPages);

                for (let pNum of hedefSayfalar) {
                    const page = await pdf.getPage(pNum);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    tamMetin += `--- SAYFA ${pNum} ---\n` + pageText + "\n\n";
                }
                orjMetinEl.value = tamMetin;
                durumEl.innerText = `PDF metni aktarıldı! (${hedefSayfalar.length} sayfa işlendi)`;

            } else if (fileName.endsWith('.tif') || fileName.endsWith('.tiff')) {
                durumEl.innerText = "TIF dosyası çözümleniyor...";
                const arrayBuffer = await file.arrayBuffer();
                const ifds = UTIF.decode(arrayBuffer);

                if (ifds && ifds.length > 0) {
                    let birlesikMetin = "";
                    const dil = document.getElementById('pdf-kaynak-dil')?.value || 'tr';
                    const langCode = (dil === 'en') ? 'eng' : 'tur';
                    const hedefSayfalar = parseSayfaAraligi(sayfaSecimInput, ifds.length);

                    const worker = await Tesseract.createWorker(langCode);

                    for (let sIdx = 0; sIdx < hedefSayfalar.length; sIdx++) {
                        const pNum = hedefSayfalar[sIdx];
                        const i = pNum - 1;

                        durumEl.innerText = `TIF Taranıyor: Sayfa ${pNum} / ${ifds.length}...`;
                        UTIF.decodeImage(arrayBuffer, ifds[i]);
                        const rgba = UTIF.toRGBA8(ifds[i]);

                        const canvas = document.createElement('canvas');
                        canvas.width = ifds[i].width;
                        canvas.height = ifds[i].height;
                        const ctx = canvas.getContext('2d');
                        const imgData = ctx.createImageData(canvas.width, canvas.height);
                        imgData.data.set(rgba);
                        ctx.putImageData(imgData, 0, 0);

                        const ret = await worker.recognize(canvas);
                        birlesikMetin += `--- SAYFA ${pNum} ---\n` + ret.data.text + "\n\n";
                    }

                    await worker.terminate();
                    orjMetinEl.value = birlesikMetin;
                    durumEl.innerText = `İşlem tamamlandı! ${hedefSayfalar.length} sayfa aktarıldı.`;
                }
            }
        } catch (error) {
            console.error(error);
            durumEl.innerText = "Belge işlenirken bir hata oluştu.";
        }
    }

    function wordOlarakIndir() {
        const metin = document.getElementById('pdf-orijinal-metin').value;
        if (!metin.trim()) return alert("İndirilecek metin bulunamadı!");

        const header = "<html xmlns:o='urn:schemas-microsoft-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'></head><body>";
        const footer = "</body></html>";
        const formattedText = metin.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>");
        const blob = new Blob(['\ufeff', header + "<p style='font-family: Arial; font-size: 11pt;'>" + formattedText + "</p>" + footer], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Evrak_Metni_' + new Date().toISOString().slice(0,10) + '.doc';
        a.click();
    }

    function metniKopyala() {
        const metin = document.getElementById('pdf-orijinal-metin').value;
        if (!metin.trim()) return alert("Metin bulunamadı!");
        navigator.clipboard.writeText(metin).then(() => alert("Metin panoya kopyalandı!"));
    }
</script>
