<div class="card">
    <h3 style="margin-bottom: 15px; color: var(--primary-light);">📄 Belge Okuma (Seçmeli Sayfa OCR & PDF) & Word'e Aktar</h3>
    <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px;">
        <div class="form-group">
            <label>Yüklenecek Dosyayı Seçin (PDF, TIF, TIFF, JPEG, PNG)</label>
            <input type="file" id="pdfInput" accept=".pdf, .tif, .tiff, .jpg, .jpeg, .png" class="form-control" onchange="belgeYukleVeIsle(event)">
        </div>
        <div class="form-group">
            <label>İşlenecek Sayfalar (Örn: 1-5, 8 veya Tümü için Boş)</label>
            <input type="text" id="sayfaSecimInput" class="form-control" placeholder="Tümü (ör: 1-3, 5, 12)">
        </div>
        <div class="form-group">
            <label>Dil Seçeneği (OCR İçin)</label>
            <select id="pdf-kaynak-dil" class="form-control">
                <option value="tr">Türkçe</option>
                <option value="en">İngilizce</option>
            </select>
        </div>
    </div>
    <div id="pdf-durum" style="margin-top: 10px; font-size: 0.88rem; color: var(--primary-light); font-weight: 600;">Hazır - Lütfen bir dosya yükleyin.</div>
</div>

<div class="grid-2">
    <div class="card">
        <div class="card-title">📄 Elde Edilen Düz Metin (Seçilen Sayfalar)</div>
        <textarea id="pdf-orijinal-metin" class="form-control" style="height: 380px; resize: vertical;" placeholder="Dosyadan okunan metinler..."></textarea>
        <div class="action-bar">
            <button class="btn btn-success" onclick="wordOlarakIndir()">📝 Word (.doc) Olarak İndir</button>
            <button class="btn" onclick="metniKopyala()">📋 Metni Panoya Kopyala</button>
        </div>
    </div>
    <div class="card">
        <div class="card-title" style="color: var(--accent);">🌐 Türkçe Çeviri (Opsiyonel)</div>
        <textarea id="pdf-ceviri-metin" class="form-control" style="height: 380px; resize: vertical;" placeholder="Çeviri alanı..."></textarea>
    </div>
</div>

<script>
    function parseSayfaAraligi(inputStr, maxSayfa) {
        if (!inputStr || !inputStr.trim()) {
            return Array.from({ length: maxSayfa }, (_, i) => i + 1);
        }
        const sayfalar = new Set();
        const parcalar = inputStr.split(',');

        for (let p of parcalar) {
            p = p.trim();
            if (p.includes('-')) {
                const aralik = p.split('-');
                const bas = parseInt(aralik[0].trim());
                const son = parseInt(aralik[1].trim());

                if (!isNaN(bas) && !isNaN(son)) {
                    const alt = Math.max(1, Math.min(bas, son));
                    const ust = Math.min(maxSayfa, Math.max(bas, son));
                    for (let i = alt; i <= ust; i++) sayfalar.add(i);
                }
            } else {
                const num = parseInt(p);
                if (!isNaN(num) && num >= 1 && num <= maxSayfa) sayfalar.add(num);
            }
        }
        return Array.from(sayfalar).sort((a, b) => a - b);
    }

    async function belgeYukleVeIsle(event) {
        const file = event.target.files[0];
        const durumEl = document.getElementById('pdf-durum');
        const orjMetinEl = document.getElementById('pdf-orijinal-metin');
        const sayfaSecimInput = document.getElementById('sayfaSecimInput')?.value;

        if (!file) return;

        durumEl.innerText = "Belge inceleniyor...";
        orjMetinEl.value = "";
        const fileName = file.name.toLowerCase();

        try {
            if (fileName.endsWith('.pdf')) {
                durumEl.innerText = "PDF dosyası okunuyor...";
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let tamMetin = "";
                const hedefSayfalar = parseSayfaAraligi(sayfaSecimInput, pdf.numPages);

                for (let pNum of hedefSayfalar) {
                    const page = await pdf.getPage(pNum);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    tamMetin += `--- SAYFA ${pNum} ---\n` + pageText + "\n\n";
                }
                orjMetinEl.value = tamMetin;
                durumEl.innerText = `PDF metni başarıyla aktarıldı! (${hedefSayfalar.length} sayfa işlendi)`;

            } else if (fileName.endsWith('.tif') || fileName.endsWith('.tiff')) {
                durumEl.innerText = "TIF dosyası çözümleniyor...";
                const arrayBuffer = await file.arrayBuffer();
                const ifds = UTIF.decode(arrayBuffer);

                if (ifds && ifds.length > 0) {
                    let birlesikMetin = "";
                    const dil = document.getElementById('pdf-kaynak-dil')?.value || 'tr';
                    const langCode = (dil === 'en') ? 'eng' : 'tur';
                    const hedefSayfalar = parseSayfaAraligi(sayfaSecimInput, ifds.length);

                    const worker = await Tesseract.createWorker(langCode);

                    for (let sIdx = 0; sIdx < hedefSayfalar.length; sIdx++) {
                        const pNum = hedefSayfalar[sIdx];
                        const i = pNum - 1;

                        durumEl.innerText = `TIF Taranıyor: Sayfa ${pNum} / ${ifds.length} (${sIdx + 1}/${hedefSayfalar.length})...`;
                        UTIF.decodeImage(arrayBuffer, ifds[i]);
                        const rgba = UTIF.toRGBA8(ifds[i]);

                        const canvas = document.createElement('canvas');
                        canvas.width = ifds[i].width;
                        canvas.height = ifds[i].height;
                        const ctx = canvas.getContext('2d');
                        const imgData = ctx.createImageData(canvas.width, canvas.height);
                        imgData.data.set(rgba);
                        ctx.putImageData(imgData, 0, 0);

                        const ret = await worker.recognize(canvas);
                        birlesikMetin += `--- SAYFA ${pNum} ---\n` + ret.data.text + "\n\n";
                    }

                    await worker.terminate();
                    orjMetinEl.value = birlesikMetin;
                    durumEl.innerText = `İşlem tamamlandı! Seçilen ${hedefSayfalar.length} sayfa aktarıldı.`;
                }
            }
        } catch (error) {
            console.error(error);
            durumEl.innerText = "Belge işlenirken hata oluştu.";
        }
    }

    function wordOlarakIndir() {
        const metin = document.getElementById('pdf-orijinal-metin').value;
        if (!metin.trim()) return alert("İndirilecek metin bulunamadı!");

        const header = "<html xmlns:o='urn:schemas-microsoft-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'></head><body>";
        const footer = "</body></html>";
        const formattedText = metin.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>");
        const blob = new Blob(['\ufeff', header + "<p style='font-family: Arial; font-size: 11pt;'>" + formattedText + "</p>" + footer], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Evrak_Metni_' + new Date().toISOString().slice(0,10) + '.doc';
        a.click();
    }

    function metniKopyala() {
        const metin = document.getElementById('pdf-orijinal-metin').value;
        if (!metin.trim()) return alert("Metin bulunamadı!");
        navigator.clipboard.writeText(metin).then(() => alert("Kopyalandı!"));
    }
</script>
