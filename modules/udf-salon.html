<div class="card" style="background: rgba(255,255,255,0.02); padding: 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);">
    <h3 style="margin-bottom: 15px; color: var(--primary-light);">⚖️ UDF Şablon Doldurma ve Otomasyon</h3>
    <p style="font-size: 0.88rem; color: var(--text-muted); margin-bottom: 20px;">
        UYAP Doküman Editörü'nde hazırladığınız bir şablonu yükleyin. Şablonunuzda değişken olmasını istediğiniz yerlere <b>[MAHKEME]</b>, <b>[DAVACI]</b>, <b>[DAVALI]</b> ve <b>[KONU]</b> yazın. Sistem bu değişkenleri formdaki verilerle otomatik değiştirecektir.
    </p>

    <!-- 1. ŞABLON YÜKLEME ALANI -->
    <div class="form-group" style="margin-bottom: 20px;">
        <label style="font-weight: bold; color: var(--accent);">1. UDF Şablon Dosyanızı Yükleyin:</label>
        <input type="file" id="udfTemplateInput" accept=".udf" class="form-control" style="margin-top: 5px; padding: 10px; background: rgba(0,0,0,0.2); border: 1px dashed var(--primary-light); color: #fff;">
    </div>

    <!-- 2. TARAF VE DAVA BİLGİLERİ FORMU -->
    <h4 style="color: var(--primary-light); font-size: 1rem; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;">2. Belge Değişkenleri</h4>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
        <div class="form-group">
            <label style="font-size: 0.85rem; color: #ccc;">Mahkeme Adı:</label>
            <input type="text" id="inputMahkeme" class="form-control" placeholder="Örn: Ankara 1. İdare Mahkemesi Başkanlığına" style="width: 100%; padding: 8px; margin-top: 4px;">
        </div>
        
        <div class="form-group">
            <label style="font-size: 0.85rem; color: #ccc;">Dava Konusu:</label>
            <input type="text" id="inputKonu" class="form-control" placeholder="Örn: İdari İşlemin İptali İstemi" style="width: 100%; padding: 8px; margin-top: 4px;">
        </div>

        <div class="form-group">
            <label style="font-size: 0.85rem; color: #ccc;">Davacı (Ad Soyad / Unvan - TCKN):</label>
            <textarea id="inputDavaci" class="form-control" rows="2" placeholder="Örn: Ahmet Yılmaz (TC: 12345678900)" style="width: 100%; padding: 8px; margin-top: 4px;"></textarea>
        </div>

        <div class="form-group">
            <label style="font-size: 0.85rem; color: #ccc;">Davalı (İdare / Kurum):</label>
            <textarea id="inputDavali" class="form-control" rows="2" placeholder="Örn: Sosyal Güvenlik Kurumu Başkanlığı" style="width: 100%; padding: 8px; margin-top: 4px;"></textarea>
        </div>
    </div>

    <!-- 3. İŞLEM BUTONU VE SONUÇ -->
    <button onclick="udfUretVeIndir()" class="btn btn-success" style="padding: 10px 20px; font-weight: bold; width: 100%; font-size: 1rem; cursor: pointer;">
        ⚙️ UDF Dosyasını Üret ve İndir
    </button>
    
    <div id="udfSonucMesaji" style="margin-top: 15px; font-size: 0.9rem; font-weight: bold;"></div>
</div>

<script>
    async function udfUretVeIndir() {
        const fileInput = document.getElementById('udfTemplateInput');
        const sonucAlani = document.getElementById('udfSonucMesaji');
        
        if (fileInput.files.length === 0) {
            sonucAlani.style.color = '#e74c3c';
            sonucAlani.innerText = "⚠️ Lütfen önce bir .udf şablon dosyası yükleyin.";
            return;
        }

        const file = fileInput.files[0];
        const mahkeme = document.getElementById('inputMahkeme').value.trim();
        const davaci = document.getElementById('inputDavaci').value.trim();
        const davali = document.getElementById('inputDavali').value.trim();
        const konu = document.getElementById('inputKonu').value.trim();

        try {
            // UDF dosyasını metin (XML) olarak okuma
            const reader = new FileReader();
            reader.onload = function(e) {
                let udfIcerik = e.target.result;

                // Dinamik Değişkenleri Şablon İçinde Bul ve Değiştir
                // Not: Global değiştirme için regex kullanılmıştır.
                if (mahkeme) udfIcerik = udfIcerik.replace(/\[MAHKEME\]/g, mahkeme);
                if (davaci) udfIcerik = udfIcerik.replace(/\[DAVACI\]/g, davaci);
                if (davali) udfIcerik = udfIcerik.replace(/\[DAVALI\]/g, davali);
                if (konu) udfIcerik = udfIcerik.replace(/\[KONU\]/g, konu);

                // Değiştirilmiş metni tekrar Blob nesnesine çevirip indirme işlemi
                const degistirilmisBlob = new Blob([udfIcerik], { type: "application/xml" });
                const indirLink = document.createElement("a");
                indirLink.href = URL.createObjectURL(degistirilmisBlob);
                
                // Yeni dosya adını belirleme
                const temizTarih = new Date().toISOString().split('T')[0];
                indirLink.download = `Dilekce_${davaci ? davaci.split(' ')[0] : 'Yeni'}_${temizTarih}.udf`;
                
                // İndirme tetiklemesi
                document.body.appendChild(indirLink);
                indirLink.click();
                document.body.removeChild(indirLink);

                sonucAlani.style.color = 'var(--accent)';
                sonucAlani.innerText = "✅ UDF belgesi başarıyla oluşturuldu ve indirildi.";
            };
            
            // UTF-8 formatında okuyarak Türkçe karakter sorununu önlüyoruz
            reader.readAsText(file, "UTF-8");

        } catch (error) {
            console.error(error);
            sonucAlani.style.color = '#e74c3c';
            sonucAlani.innerText = "⚠️ Dosya işlenirken bir hata oluştu: " + error.message;
        }
    }
</script>
